name: Build & Deploy

# Buildamos a imagem no GitHub Actions (com cache persistente entre runs
# via `type=gha`), publicamos em ghcr.io e disparamos um webhook do
# Easypanel pra ele apenas fazer `docker pull` + restart. Deploy fim-a-fim
# cai de 5-10 min pra ~30-60s.
#
# Setup no GitHub (Settings -> Secrets and variables -> Actions):
#
#   Secrets:
#     EASYPANEL_WEBHOOK_PROD    URL do webhook do servico backend em prod
#     EASYPANEL_WEBHOOK_DEV     URL do webhook do servico backend em dev
#
# Setup no Easypanel (por servico):
#   Source: Docker Image
#   Image:  ghcr.io/mikyxx1234/backend_crm1:latest   (prod)
#           ghcr.io/mikyxx1234/backend_crm1:dev      (dev)
#   Registry credentials: crie um GitHub PAT com escopo `read:packages` e
#     cadastre em Easypanel -> Registries. (Se o pacote estiver public,
#     nao precisa autenticar.)
#   Deploy webhook: copie do Easypanel (Settings do servico -> Deployments
#     -> Deploy Hook) e coloque em EASYPANEL_WEBHOOK_PROD/DEV.
#
# Backend nao precisa de build args (o server so le env em runtime).
# BACKEND_PUBLIC_URL, DATABASE_URL, META_APP_SECRET etc. sao configurados
# como envs runtime no Easypanel, nao no build.

on:
  push:
    branches: [main, DEV_BRANCH]
  workflow_dispatch:

# Cancela runs anteriores da mesma branch quando um push novo chega.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mikyxx1234/backend_crm1

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        # Passar via `env:` (nao inline ${{ }}) e trim de \r\n protege
        # contra valores com Enter acidental colados no GitHub UI, que
        # quebravam o parser de $GITHUB_OUTPUT com "Invalid format".
        env:
          BRANCH_REF: ${{ github.ref }}
          S_WEBHOOK_PROD: ${{ secrets.EASYPANEL_WEBHOOK_PROD }}
          S_WEBHOOK_DEV: ${{ secrets.EASYPANEL_WEBHOOK_DEV }}
        run: |
          if [ "$BRANCH_REF" = "refs/heads/main" ]; then
            TAG=latest
            WEBHOOK="$S_WEBHOOK_PROD"
          else
            TAG=dev
            WEBHOOK="$S_WEBHOOK_DEV"
          fi
          TAG=$(printf '%s' "$TAG" | tr -d '\r\n')
          WEBHOOK=$(printf '%s' "$WEBHOOK" | tr -d '\r\n')
          {
            echo "TAG=$TAG"
            echo "WEBHOOK=$WEBHOOK"
          } >> "$GITHUB_OUTPUT"
          echo "::group::env resolved (values masked)"
          [ -n "$TAG" ]     && echo "TAG=<set>"     || echo "TAG=<EMPTY>"
          [ -n "$WEBHOOK" ] && echo "WEBHOOK=<set>" || echo "WEBHOOK=<EMPTY>"
          echo "::endgroup::"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.env.outputs.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Scope por branch + fallback pra main: builds de DEV_BRANCH
          # aproveitam camadas ja cacheadas por main quando o proprio
          # cache esta frio (antes DEV rodava ~5min vs 2min em main).
          cache-from: |
            type=gha,scope=${{ github.ref_name }}
            type=gha,scope=main
          cache-to: type=gha,scope=${{ github.ref_name }},mode=max

      - name: Trigger Easypanel redeploy
        if: steps.env.outputs.WEBHOOK != ''
        timeout-minutes: 5
        run: |
          echo "Chamando webhook do Easypanel (fire-and-forget, com retry)..."
          WEBHOOK="${{ steps.env.outputs.WEBHOOK }}"
          code=000
          for i in 1 2 3 4 5; do
            # --connect-timeout: falha rapido se o host nao responder.
            # --max-time: NUNCA pendura — o EasyPanel mantem a conexao aberta
            #   transmitindo o build, entao limitamos o tempo de leitura.
            out=$(curl -sS -o /dev/null \
              -w "%{http_code} %{exitcode} %{time_connect}" \
              --connect-timeout 15 --max-time 45 \
              -X POST "$WEBHOOK" \
              -H "User-Agent: github-actions/backend_crm1") || true
            code=$(printf '%s' "$out" | awk '{print $1}')
            ex=$(printf '%s' "$out" | awk '{print $2}')
            tconn=$(printf '%s' "$out" | awk '{print $3}')
            echo "Tentativa $i -> HTTP ${code:-000} (curl exit ${ex:-?}, connect ${tconn:-?}s)"
            case "$code" in
              2*) echo "Webhook aceito pelo Easypanel (HTTP $code)."; exit 0 ;;
            esac
            # Timeout de LEITURA apos conectar (exit 28 + conexao estabelecida):
            # o EasyPanel ja RECEBEU o POST e faz o redeploy de forma assincrona.
            if [ "$ex" = "28" ] && [ -n "$tconn" ] && [ "$tconn" != "0.000000" ] && [ "$tconn" != "0" ]; then
              echo "Timeout de leitura apos envio — redeploy disparado (assincrono). OK."
              exit 0
            fi
            sleep 5
          done
          echo "ERRO: webhook do Easypanel falhou apos 5 tentativas (ultimo HTTP ${code:-000})."
          exit 1
